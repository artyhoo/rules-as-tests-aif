        run: bash tests/agnosticism/harness-self.test.sh

  # Static type gate. Closes the missing edit-time→CI typecheck channel: `tsc
  # --noEmit` was a local-only `package.json` script, never gated, so a type
  # error could (and did, Wave 10.4) reach main green. Runs every workspace via
  # the root `npm run typecheck --workspaces` aggregate; fails on any error.
  typecheck:
    name: TypeScript typecheck (tsc --noEmit, all workspaces)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps
        run: npm install --silent
      - name: Typecheck all workspaces (tsc --noEmit)
        run: npm run typecheck

  # Last-resort CI mirror of the pre-push §1.7 + §7 Prior-art trailer checks, run
  # over the REAL PR commit range (origin/main..HEAD) through the PREPUSH_ONLY seam
  # in packages/core/hooks/pre-push.ts. Closes the `--no-verify` bypass: pre-push
  # runs only on the developer machine, so a bypassed push would otherwise reach
  # main with no trailer enforcement and no record.
  #   §1.7 is HARD-ENFORCED here (S17_WARN_ONLY=false on the step) so the last-resort
  #     gate blocks regardless of the pre-push calibration default — without this the
  #     step would be green-but-warn-only until the pre-push flip (#119) lands, i.e. a
  #     named gate that never fires (false-negative theatre). The CI gate is strict.
  #   §7 base (trailer missing/invalid) always blocks; §7 substance (`Prior-art:
  #     skipped` on a capability commit) stays warn-only — Option B, the documented
  #     CLAUDE.md escape hatch must not be hard-blocked here.
  # PR-only gate (the merge-time backstop; reused logic, no duplication).
  pr-commit-trailers:
    name: PR commit trailers — §1.7 + Prior-art (real-commit backstop)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0  # full history so <base>..HEAD resolves the PR commits
          ref: ${{ github.event.pull_request.head.sha }}  # PR tip, not the synthetic merge commit
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps (hoists tsx to root)
        run: npm install --silent
      - name: Ensure PR base ref is present
        # Diff against the actual PR base (github.base_ref), not a hard-coded
        # origin/main — so the backstop also gates PRs targeting a non-main base
        # (epic/staging, §13.40 automerge plan). base_ref via env, not inline
        # ${{…}} in run:, to avoid template-injection (zizmor). Fail loudly if the
        # base is unresolvable: pre-push.ts's upstreamExists() would otherwise
        # SILENTLY SKIP the checks (rc 0) — a false-pass that defeats the backstop.
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags --quiet origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          git rev-parse --verify "origin/${BASE_REF}" >/dev/null \
            || { echo "::error::base ref origin/${BASE_REF} not resolvable — refusing to skip the backstop"; exit 1; }
      - name: §1.7 discipline-trailer check over PR commits (hard-enforced)
        # Promotion exemption: a staging→main PR re-checks the SAME commits this
        # job already enforced at each feature→staging merge (it runs there too).
        # The 134-commit promotion range inevitably includes trailerless commits
        # (dependabot bumps, merge commits), so promotions are ALWAYS red and
        # train routine admin-override (#discipline-theatre). Tolerate failures on
        # promotion ONLY — the step still runs and logs violations (record kept),
        # but no longer blocks. All non-promotion PRs keep hard enforcement.
        continue-on-error: ${{ github.base_ref == 'main' && github.head_ref == 'staging' }}
        env:
          S17_WARN_ONLY: 'false'
          S17_SUBSTANCE_WARN_ONLY: 'false'
          PREPUSH_UPSTREAM_REF: origin/${{ github.base_ref }}
        run: PREPUSH_ONLY=s17 npx tsx packages/core/hooks/pre-push.ts
      - name: §7 Prior-art trailer check over PR commits (base blocks; substance warn-only per Option B)
        # Same promotion exemption as the §1.7 step above (head=staging && base=main).
        continue-on-error: ${{ github.base_ref == 'main' && github.head_ref == 'staging' }}
        env:
          PREPUSH_UPSTREAM_REF: origin/${{ github.base_ref }}
        run: PREPUSH_ONLY=prior-art npx tsx packages/core/hooks/pre-push.ts

  enforce-husky-presence:
    name: Verify .husky/ hooks exist and are non-trivial
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Verify .husky/ hooks exist and are executable
        run: |
          for hook in .husky/pre-commit .husky/pre-push; do
            test -f "$hook" || { echo "::error::missing $hook"; exit 1; }
            test -x "$hook" || { echo "::error::$hook not executable"; exit 1; }
            # non-empty + non-trivial (not just exit 0). Wave 10.1: the pre-push
            # hook may delegate its probes to the TS orchestrator
            # (packages/core/hooks/pre-push.ts) rather than inline them, so the
            # dispatch reference counts as non-trivial too.
            grep -qE '\b(actionlint|zizmor|bash -n|json\.load|yaml\.safe_load)\b|packages/core/hooks/pre-push\.ts' "$hook" \
              || { echo "::error::$hook lacks expected probes (looks empty/stub)"; exit 1; }
          done
          echo "✓ .husky/ hooks present, executable, non-trivial"

  framework-self-install-ts-server:
