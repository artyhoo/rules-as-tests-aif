        run: |
          mkdir -p /tmp/fake-consumer-ts && cd /tmp/fake-consumer-ts
          git init --quiet
          git config user.email "ci@example.com"
          git config user.name "CI"
          echo '{"name":"fake-consumer-ts","version":"0.0.0","private":true}' > package.json
          bash "$GITHUB_WORKSPACE/install.sh" ts-server
      - name: Run framework own audits (Wave 10.4 — vitest, ts-server)
        run: |
          cd "$GITHUB_WORKSPACE"
          npx --prefix packages/core vitest run --reporter=default packages/core/audit-self/audit-ai-docs.test.ts || \
            { echo "::error::framework audits failed (ts-server consumer)"; exit 1; }

