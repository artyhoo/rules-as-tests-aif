name: audit-self

on:
  push:
    branches: [main, 'chore/**']
  pull_request:

jobs:
  mechanical:
    name: Mechanical checks (bash, json, dead links)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Bash syntax of all *.sh
        run: |
          fail=0
          while IFS= read -r f; do
            if ! bash -n "$f" 2>err.log; then
              echo "::error file=$f::syntax error"
              cat err.log
              fail=1
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*")
          exit "$fail"

      - name: JSON validity of all *.json
        run: |
          fail=0
          while IFS= read -r f; do
            if ! python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f" 2>err.log; then
              echo "::error file=$f::invalid JSON"
              cat err.log
              fail=1
            fi
          done < <(find . -name "*.json" -not -path "./.git/*" -not -path "./node_modules/*")
          exit "$fail"

      - name: No file > 500 lines (markdown)
        run: |
          fail=0
          # Exempt list: declared-transient artifacts per their own disclaimer.
          # Each entry MUST include rationale comment.
          # Guard: each exempt file must contain "transient artifact" in first 20 lines
          # — prevents agents from adding entries to EXEMPT without in-file justification.
          EXEMPT=(
            "./docs/meta-factory/EXECUTION-PLAN.md"  # transient pre-1.0 plan, see line 8
          )
          # Exempt directories: audit-trail accumulators where length is proportional
          # to investigation depth, not freedom-of-prose. Each entry MUST include
          # rationale comment. The 500-line limit was designed for freedom-of-prose
          # docs (README, retros, canonical docs) where brevity is discipline.
          # Audit-trail accumulators have a different shape: evidence-per-claim
          # (T3), adversarial counter-prompt (T7), §1.7 self-review — collectively
          # incompressible without losing the substance the discipline mandates.
          # Recursive self-application gap discovered 2026-05-16 (CI fail on
          # 785-line research-patch honestly applying all discipline):
          # .claude/rules/phase-research-coverage.md §4 #recursive-self-application-gap
          EXEMPT_DIRS=(
            "./docs/meta-factory/research-patches/"  # research-patches: evidence accumulator, length ∝ investigation depth
          )
          while IFS= read -r f; do
            # Directory-level exemption first (cheaper than per-file marker check)
            for ex_dir in "${EXEMPT_DIRS[@]}"; do
              case "$f" in
                "$ex_dir"*) continue 2 ;;
              esac
            done
            for ex in "${EXEMPT[@]}"; do
              if [ "$f" = "$ex" ]; then
                if head -20 "$f" | grep -qi "transient artifact"; then
                  echo "::notice file=$f::skipped overweight check (declared transient)"
                  continue 2
                else
                  echo "::error file=$f::listed in EXEMPT but no 'transient artifact' marker in first 20 lines"
                  fail=1
                  continue 2
                fi
              fi
            done
            n=$(wc -l < "$f")
            if [ "$n" -gt 500 ]; then
              echo "::error file=$f::overweight ($n lines, max 500)"
              fail=1
            fi
          done < <(find . -name "*.md" -not -path "./.git/*")
          exit "$fail"

      - name: Dead-link check (.md → .md)
        run: |
          while IFS= read -r src; do
            # shellcheck disable=SC2016  # regex literal, no expansion intended
            grep -oE '`[^`]*\.md`' "$src" 2>/dev/null | tr -d '`' | sort -u | while read -r ref; do
              case "$ref" in
                # AIF convention rename targets (template → final name) — not real files in the repo
                *.ai-factory/*|*AGENTS.md|*CLAUDE.md|*DESCRIPTION.md|*ARCHITECTURE.md|*.template.md|*\<*) continue ;;
                docs/architecture.md) continue ;;  # used as anti-pattern example
              esac
              base=$(basename "$ref")
              if ! find . -name "$base" -not -path "./.git/*" 2>/dev/null | grep -q .; then
                echo "::warning file=$src::dead .md reference → $ref"
              fi
            done
            # historical audit reports may reference suggested filenames / anti-patterns
          done < <(find . -name "*.md" -not -path "./.git/*" -not -name "audit-results-*.md" -not -path "./docs/audits/*")

      - name: Research patch scope annotations
        run: |
          fail=0
          while IFS= read -r f; do
            [[ "$(basename "$f")" == "README.md" ]] && continue
            first=$(head -1 "$f")
            if [[ "$first" != "<!-- scope:"* ]]; then
              echo "::error file=$f::missing <!-- scope:... --> annotation on first line"
              fail=1
            fi
          done < <(find docs/meta-factory/research-patches -maxdepth 1 -name "*.md")
          exit "$fail"

      - name: Stale path references
        run: |
          fail=0
          if grep -rn "ai-factory-RULES\.md" --include="*.md" --include="*.sh" .; then
            echo "::error::stale 'ai-factory-RULES.md' reference (renamed to factory/RULES.md)"
            fail=1
          fi
          if grep -rn "best-practices-sidecar\.react\.md" --include="*.md" .; then
            echo "::error::stale 'best-practices-sidecar.react.md' reference (was inlined)"
            fail=1
          fi
          exit "$fail"

  rule-to-probe:
    name: Rule-to-probe mapping
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Every R-rule has probe / manual / ESLint delegation
        run: |
          fail=0
          for rules_file in packages/preset-next-15-canonical/RULES.md packages/preset-next-15-canonical/RULES.react-next.md; do
            # ^## R<digits>[<lowercase>]?  — matches R1..R20, R16a/R16b; excludes "## Rule maintenance"
            while IFS= read -r r; do
              in_audit=0
              # skip_unless R<n>[a-z]*  — covers R16 → R16a/R16b sub-probes
              # Wave 10.4: also grep *.ts (audit-ai-docs.ts replaced audit-ai-docs.sh)
              grep -qE "skip_unless ${r}[a-z]*\b" packages/core/audit-self/*.sh packages/core/audit-self/*.ts packages/preset-next-15-canonical/audit-self/*.sh 2>/dev/null && in_audit=1
              in_manual=0
              # Wave 10.4: agents/best-practices-sidecar.md removed in PR #79; markers now in *.ts.
              # Use find+xargs to avoid nonexistent-file exit-code-2 masking valid matches.
              if find packages/core/audit-self packages/preset-next-15-canonical/audit-self \( -name "*.sh" -o -name "*.ts" \) -print0 2>/dev/null | \
                 xargs -0 grep -qE "$r.*manual|manual.*$r|$r.*delegated|delegated.*$r" 2>/dev/null; then
                in_manual=1
              fi
              if [ "$in_audit" -eq 0 ] && [ "$in_manual" -eq 0 ]; then
                echo "::error::orphan rule $r — no probe, no manual review note, no delegation"
                fail=1
              fi
            done < <(grep -oE "^## R[0-9]+[a-z]?" "$rules_file" | grep -oE "R[0-9]+[a-z]?")
          done
          exit "$fail"

  probe-tests:
    name: Negative tests for audit probes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install packages/core deps (remark + vitest for audit-ai-docs.test.ts)
        run: npm install --prefix packages/core --silent
      - name: Run packages/core/audit-self/audit-ai-docs.test.ts (Wave 10.4 — vitest)
        run: |
          if [ -f packages/core/audit-self/audit-ai-docs.test.ts ]; then
            npx --prefix packages/core vitest run --reporter=default packages/core/audit-self/audit-ai-docs.test.ts
          else
            echo "::error::packages/core/audit-self/audit-ai-docs.test.ts missing"
            exit 1
          fi

  manifest-render-check:
    name: Manifest → RULES.md drift check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps (hoists tsx to root)
        run: npm install --silent
      - name: Render & diff
        run: npx tsx packages/core/render/render-rules.ts --check

  principles-meta-tests:
    name: Principles as meta-tests (Phase 2)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0  # principle 11 needs full git history for introducing-commit detection
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install packages/core deps
        run: npm install --prefix packages/core --silent
      - name: Run principles meta-tests
        run: npm --prefix packages/core run test:principles
      - name: Run prior-art trailer hook anti-tautology test (Phase 8.8 T9)
        run: bash tests/hooks/prior-art-trailer-hook.test.sh
      - name: Run §1.7 discipline trailer hook anti-tautology test (Wave 10.3)
        run: bash tests/hooks/s17-trailer-hook.test.sh
      - name: Run PREPUSH_UPSTREAM_REF override paired-negative (non-main base backstop)
        run: bash tests/hooks/prepush-upstream-ref.test.sh
      - name: Run end-of-turn claim-scan hook test (autonomous-self-audit §11.1)
        run: bash tests/hooks/eot-claim-scan.test.sh

  # Last-resort CI mirror of the pre-push §1.7 + §7 Prior-art trailer checks, run
  # over the REAL PR commit range (origin/main..HEAD) through the PREPUSH_ONLY seam
  # in packages/core/hooks/pre-push.ts. Closes the `--no-verify` bypass: pre-push
  # runs only on the developer machine, so a bypassed push would otherwise reach
  # main with no trailer enforcement and no record.
  #   §1.7 is HARD-ENFORCED here (S17_WARN_ONLY=false on the step) so the last-resort
  #     gate blocks regardless of the pre-push calibration default — without this the
  #     step would be green-but-warn-only until the pre-push flip (#119) lands, i.e. a
  #     named gate that never fires (false-negative theatre). The CI gate is strict.
  #   §7 base (trailer missing/invalid) always blocks; §7 substance (`Prior-art:
  #     skipped` on a capability commit) stays warn-only — Option B, the documented
  #     CLAUDE.md escape hatch must not be hard-blocked here.
  # PR-only gate (the merge-time backstop; reused logic, no duplication).
  pr-commit-trailers:
    name: PR commit trailers — §1.7 + Prior-art (real-commit backstop)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0  # full history so <base>..HEAD resolves the PR commits
          ref: ${{ github.event.pull_request.head.sha }}  # PR tip, not the synthetic merge commit
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps (hoists tsx to root)
        run: npm install --silent
      - name: Ensure PR base ref is present
        # Diff against the actual PR base (github.base_ref), not a hard-coded
        # origin/main — so the backstop also gates PRs targeting a non-main base
        # (epic/staging, §13.40 automerge plan). base_ref via env, not inline
        # ${{…}} in run:, to avoid template-injection (zizmor). Fail loudly if the
        # base is unresolvable: pre-push.ts's upstreamExists() would otherwise
        # SILENTLY SKIP the checks (rc 0) — a false-pass that defeats the backstop.
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags --quiet origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          git rev-parse --verify "origin/${BASE_REF}" >/dev/null \
            || { echo "::error::base ref origin/${BASE_REF} not resolvable — refusing to skip the backstop"; exit 1; }
      - name: §1.7 discipline-trailer check over PR commits (hard-enforced)
        env:
          S17_WARN_ONLY: 'false'
          S17_SUBSTANCE_WARN_ONLY: 'false'
          PREPUSH_UPSTREAM_REF: origin/${{ github.base_ref }}
        run: PREPUSH_ONLY=s17 npx tsx packages/core/hooks/pre-push.ts
      - name: §7 Prior-art trailer check over PR commits (base blocks; substance warn-only per Option B)
        env:
          PREPUSH_UPSTREAM_REF: origin/${{ github.base_ref }}
        run: PREPUSH_ONLY=prior-art npx tsx packages/core/hooks/pre-push.ts

  enforce-husky-presence:
    name: Verify .husky/ hooks exist and are non-trivial
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Verify .husky/ hooks exist and are executable
        run: |
          for hook in .husky/pre-commit .husky/pre-push; do
            test -f "$hook" || { echo "::error::missing $hook"; exit 1; }
            test -x "$hook" || { echo "::error::$hook not executable"; exit 1; }
            # non-empty + non-trivial (not just exit 0). Wave 10.1: the pre-push
            # hook may delegate its probes to the TS orchestrator
            # (packages/core/hooks/pre-push.ts) rather than inline them, so the
            # dispatch reference counts as non-trivial too.
            grep -qE '\b(actionlint|zizmor|bash -n|json\.load|yaml\.safe_load)\b|packages/core/hooks/pre-push\.ts' "$hook" \
              || { echo "::error::$hook lacks expected probes (looks empty/stub)"; exit 1; }
          done
          echo "✓ .husky/ hooks present, executable, non-trivial"

  framework-self-install-ts-server:
    name: Self-install on tmp consumer (ts-server)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install python pyyaml (required by audit probes)
        run: pip install pyyaml
      - name: Install packages/core deps (remark + vitest for audit-ai-docs.test.ts)
        run: npm install --prefix "$GITHUB_WORKSPACE/packages/core" --silent
      - name: Self-install on tmp consumer (ts-server preset)
        run: |
          mkdir -p /tmp/fake-consumer-ts && cd /tmp/fake-consumer-ts
          git init --quiet
          git config user.email "ci@example.com"
          git config user.name "CI"
          echo '{"name":"fake-consumer-ts","version":"0.0.0","private":true}' > package.json
          bash "$GITHUB_WORKSPACE/install.sh" ts-server
      - name: Run framework own audits (Wave 10.4 — vitest, ts-server)
        run: |
          cd "$GITHUB_WORKSPACE"
          npx --prefix packages/core vitest run --reporter=default packages/core/audit-self/audit-ai-docs.test.ts || \
            { echo "::error::framework audits failed (ts-server consumer)"; exit 1; }

  framework-self-install-react-next:
    name: Self-install on tmp consumer (react-next)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install python pyyaml (required by audit probes)
        run: pip install pyyaml
      - name: Install packages/core deps (remark + vitest for audit-ai-docs.test.ts)
        run: npm install --prefix "$GITHUB_WORKSPACE/packages/core" --silent
      - name: Self-install on tmp consumer (react-next preset)
        run: |
          mkdir -p /tmp/fake-consumer-rn && cd /tmp/fake-consumer-rn
          git init --quiet
          git config user.email "ci@example.com"
          git config user.name "CI"
          echo '{"name":"fake-consumer-rn","version":"0.0.0","private":true}' > package.json
          # next.config.js triggers auto-detection in setup.sh; also pass explicit stack to install.sh
          echo 'module.exports = {};' > next.config.js
          bash "$GITHUB_WORKSPACE/install.sh" react-next
      - name: Run framework own audits (Wave 10.4 — vitest, react-next)
        run: |
          cd "$GITHUB_WORKSPACE"
          npx --prefix packages/core vitest run --reporter=default packages/core/audit-self/audit-ai-docs.test.ts || \
            { echo "::error::framework audits failed (react-next consumer)"; exit 1; }

  framework-self-detect:
    name: Detector v1 — self-application snapshot (L1 invariant)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps (hoists tsx + transitive semver)
        run: npm install --silent
      - name: Detect this repo and diff against frozen snapshot
        run: |
          ACTUAL=$(npm --prefix packages/core run detect --silent -- "$GITHUB_WORKSPACE")
          EXPECTED=$(cat packages/core/detector/expected-self-detect.json)
          if ! diff <(echo "$ACTUAL" | jq -S .) <(echo "$EXPECTED" | jq -S .); then
            echo "::error::detector self-application snapshot drift — update packages/core/detector/expected-self-detect.json or fix the regression"
            exit 1
          fi
          echo "✓ self-detect snapshot stable"
      - name: Verify setup.sh --stack=$(detect) --dry-run idempotent
        run: |
          DETECTED=$(npm --prefix packages/core run detect --silent -- "$GITHUB_WORKSPACE" | jq -r .stack)
          bash setup.sh --stack="$DETECTED" --dry-run --skip-aif-init --skip-deps > /tmp/run1.txt 2>&1
          bash setup.sh --stack="$DETECTED" --dry-run --skip-aif-init --skip-deps > /tmp/run2.txt 2>&1
          if ! diff /tmp/run1.txt /tmp/run2.txt > /dev/null; then
            echo "::error::setup.sh --dry-run is not idempotent — L1 acceptance (a) violated"
            diff /tmp/run1.txt /tmp/run2.txt
            exit 1
          fi
          echo "✓ setup.sh --dry-run idempotent (L1 acceptance a)"

  framework-self-research:
    name: Research Agent v1 — self-application snapshot (L2 invariant)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps (hoists tsx + transitive semver + ajv)
        run: npm install --silent
      - name: Run research --self and diff against frozen snapshot
        run: |
          ACTUAL=$(npm --prefix packages/core run research --silent -- --self "$GITHUB_WORKSPACE")
          EXPECTED=$(cat packages/core/research/expected-self-research.json)
          if ! diff <(echo "$ACTUAL" | jq -S .) <(echo "$EXPECTED" | jq -S .); then
            echo "::error::research self-application snapshot drift — fix the doc divergence or update packages/core/research/expected-self-research.json"
            exit 1
          fi
          echo "✓ self-research snapshot stable (L2 invariant b)"
      - name: Drift detection on canonical own-doc sources (L2 invariant a)
        run: |
          MISMATCHES=$(npm --prefix packages/core run research --silent -- --self "$GITHUB_WORKSPACE" | jq '.drift.mismatches | length')
          if [ "$MISMATCHES" != "0" ]; then
            echo "::error::symbolic drift detected in skills/SKILL.md / references/{overview,ai-traps}.md"
            npm --prefix packages/core run research --silent -- --self "$GITHUB_WORKSPACE" | jq '.drift.mismatches'
            exit 1
          fi
          echo "✓ zero drift across the 3 canonical self-app sources (L2 invariant a)"

  framework-self-synth:
    name: Synthesizer v1 — self-application snapshot (L3 invariant a)
    runs-on: ubuntu-latest
    needs: principles-meta-tests
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps
        run: npm install --silent
      - name: Synth on own repo and diff against frozen snapshot
        run: |
          ACTUAL=$(npm --prefix packages/core run synth --silent -- "$GITHUB_WORKSPACE")
          EXPECTED=$(cat packages/core/synthesizer/expected-self-synth.json)
          if ! diff <(echo "$ACTUAL" | jq -S .) <(echo "$EXPECTED" | jq -S .); then
            echo "::error::synthesizer self-application snapshot drift — fix the regression or update packages/core/synthesizer/expected-self-synth.json"
            exit 1
          fi
          echo "✓ self-synth snapshot stable (own repo, ts-server, no patterns)"
      - name: Synth on next-16 fixture and diff against frozen snapshot
        run: |
          FIXTURE="$GITHUB_WORKSPACE/packages/core/synthesizer/fixtures/next-16-fixture"
          ACTUAL=$(npm --prefix packages/core run synth --silent -- "$FIXTURE")
          EXPECTED=$(cat packages/core/synthesizer/expected-fixture-synth.json)
          if ! diff <(echo "$ACTUAL" | jq -S .) <(echo "$EXPECTED" | jq -S .); then
            echo "::error::synthesizer fixture snapshot drift — fix the regression or update packages/core/synthesizer/expected-fixture-synth.json"
            exit 1
          fi
          echo "✓ fixture-synth snapshot stable (next-16, 3 rules)"

  framework-self-validate:
    name: Validator v1 — self-application snapshot (L4 invariant)
    runs-on: ubuntu-latest
    needs: principles-meta-tests
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps (hoists eslint + ts-eslint)
        run: npm install --silent
      - name: Validate own repo synth output and diff against frozen snapshot
        run: |
          ACTUAL=$(npm --prefix packages/core run validate --silent -- "$GITHUB_WORKSPACE")
          EXPECTED=$(cat packages/core/validator/expected-self-validate.json)
          if ! diff <(echo "$ACTUAL" | jq -S .) <(echo "$EXPECTED" | jq -S .); then
            echo "::error::validator self-application snapshot drift — fix the regression or update packages/core/validator/expected-self-validate.json"
            exit 1
          fi
          echo "✓ self-validate snapshot stable (own repo, all gates pass/n/a)"
      - name: Validate next-16 fixture and diff against frozen snapshot
        run: |
          FIXTURE="$GITHUB_WORKSPACE/packages/core/synthesizer/fixtures/next-16-fixture"
          ACTUAL=$(npm --prefix packages/core run validate --silent -- "$FIXTURE")
          EXPECTED=$(cat packages/core/validator/expected-fixture-validate.json)
          if ! diff <(echo "$ACTUAL" | jq -S .) <(echo "$EXPECTED" | jq -S .); then
            echo "::error::validator fixture snapshot drift — fix the regression or update packages/core/validator/expected-fixture-validate.json"
            exit 1
          fi
          echo "✓ fixture-validate snapshot stable (next-16, all 4 REQUIRED gates pass)"
      - name: Emit aif-gate-result JSON to job summary (Phase 8 — closes Phase 11.1 partial)
        run: |
          # Per AIF SKILL.md "Append machine-readable gate result". Orchestrators
          # downstream of /aif-verify parse this block; emission is non-blocking
          # and structurally compatible with aif-comparison.md §7 11.1.
          GATE_RESULT=$(npm --prefix packages/core run validate --silent -- --aif-gate-result "$GITHUB_WORKSPACE")
          {
            echo '## aif-gate-result (rules)';
            echo '```json';
            echo "$GATE_RESULT";
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
          echo "✓ aif-gate-result emitted to job summary"

  framework-self-install-validated:
    name: Installer v1 — self-application snapshot (L5 invariant)
    runs-on: ubuntu-latest
    needs: principles-meta-tests
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps
        run: npm install --silent
      - name: Synth → install → diff deterministic shape vs frozen snapshot
        run: |
          TMP_CONSUMER=$(mktemp -d)
          npm --prefix packages/core run synth --silent -- "$GITHUB_WORKSPACE" > /tmp/synth.json
          npm --prefix packages/core run install:synth --silent -- "$TMP_CONSUMER" --from-synth /tmp/synth.json > /tmp/install-report.json
          SHAPE=$(jq -n \
            --slurpfile r /tmp/install-report.json \
            --slurpfile l "$TMP_CONSUMER/.ai-factory/synthesizer-output/rules-lock.json" \
            '{
              ok: $r[0].ok,
              installed: $r[0].installed,
              failuresCount: ($r[0].failures | length),
              artifactNames: [$r[0].artifacts[] | split("/") | last],
              lockShape: { schemaVersion: $l[0].schemaVersion, framework: $l[0].framework, version: $l[0].version, ruleIds: $l[0].ruleIds },
              preValidation: $r[0].preValidation,
              postValidation: $r[0].postValidation
            }')
          EXPECTED=$(cat packages/core/installer/expected-self-install.json)
          if ! diff <(echo "$SHAPE" | jq -S .) <(echo "$EXPECTED" | jq -S .); then
            echo "::error::installer self-application snapshot drift — fix the regression or update packages/core/installer/expected-self-install.json"
            exit 1
          fi
          echo "✓ self-install snapshot stable (own repo → tmp consumer, lock + post-validate green)"

  phase-8-canonical-regen-acceptance:
    name: Phase 8 acceptance — canonical Next 15 regen ≥0.95 similarity
    runs-on: ubuntu-latest
    needs: principles-meta-tests
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps
        run: npm install --silent
      - name: Run canonical regen acceptance test (similarity ≥0.95)
        run: npm --prefix packages/core test --silent -- tests/acceptance/canonical-regen
