name: audit-self

on:
  push:
    branches: [main, 'chore/**']
  pull_request:

jobs:
  mechanical:
    name: Mechanical checks (bash, json, dead links)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Bash syntax of all *.sh
        run: |
          fail=0
          while IFS= read -r f; do
            if ! bash -n "$f" 2>err.log; then
              echo "::error file=$f::syntax error"
              cat err.log
              fail=1
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*")
          exit "$fail"

      - name: JSON validity of all *.json
        run: |
          fail=0
          while IFS= read -r f; do
            if ! python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f" 2>err.log; then
              echo "::error file=$f::invalid JSON"
              cat err.log
              fail=1
            fi
          done < <(find . -name "*.json" -not -path "./.git/*" -not -path "./node_modules/*")
          exit "$fail"

      - name: No file > 500 lines (markdown)
        run: |
          fail=0
          # Exempt list: declared-transient artifacts per their own disclaimer.
          # Each entry MUST include rationale comment.
          # Guard: each exempt file must contain "transient artifact" in first 20 lines
          # — prevents agents from adding entries to EXEMPT without in-file justification.
          EXEMPT=(
            "./docs/meta-factory/EXECUTION-PLAN.md"  # transient pre-1.0 plan, see line 8
          )
          while IFS= read -r f; do
            for ex in "${EXEMPT[@]}"; do
              if [ "$f" = "$ex" ]; then
                if head -20 "$f" | grep -qi "transient artifact"; then
                  echo "::notice file=$f::skipped overweight check (declared transient)"
                  continue 2
                else
                  echo "::error file=$f::listed in EXEMPT but no 'transient artifact' marker in first 20 lines"
                  fail=1
                  continue 2
                fi
              fi
            done
            n=$(wc -l < "$f")
            if [ "$n" -gt 500 ]; then
              echo "::error file=$f::overweight ($n lines, max 500)"
              fail=1
            fi
          done < <(find . -name "*.md" -not -path "./.git/*")
          exit "$fail"

      - name: Dead-link check (.md → .md)
        run: |
          while IFS= read -r src; do
            # shellcheck disable=SC2016  # regex literal, no expansion intended
            grep -oE '`[^`]*\.md`' "$src" 2>/dev/null | tr -d '`' | sort -u | while read -r ref; do
              case "$ref" in
                # AIF convention rename targets (template → final name) — not real files in the repo
                *.ai-factory/*|*AGENTS.md|*CLAUDE.md|*DESCRIPTION.md|*ARCHITECTURE.md|*.template.md|*\<*) continue ;;
                docs/architecture.md) continue ;;  # used as anti-pattern example
              esac
              base=$(basename "$ref")
              if ! find . -name "$base" -not -path "./.git/*" 2>/dev/null | grep -q .; then
                echo "::warning file=$src::dead .md reference → $ref"
              fi
            done
            # historical audit reports may reference suggested filenames / anti-patterns
          done < <(find . -name "*.md" -not -path "./.git/*" -not -name "audit-results-*.md" -not -path "./docs/audits/*")

      - name: Stale path references
        run: |
          fail=0
          if grep -rn "ai-factory-RULES\.md" --include="*.md" --include="*.sh" .; then
            echo "::error::stale 'ai-factory-RULES.md' reference (renamed to factory/RULES.md)"
            fail=1
          fi
          if grep -rn "best-practices-sidecar\.react\.md" --include="*.md" .; then
            echo "::error::stale 'best-practices-sidecar.react.md' reference (was inlined)"
            fail=1
          fi
          exit "$fail"

  rule-to-probe:
    name: Rule-to-probe mapping
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Every R-rule has probe / manual / ESLint delegation
        run: |
          fail=0
          for rules_file in packages/preset-next-15-canonical/RULES.md packages/preset-next-15-canonical/RULES.react-next.md; do
            # ^## R<digits>[<lowercase>]?  — matches R1..R20, R16a/R16b; excludes "## Rule maintenance"
            while IFS= read -r r; do
              in_audit=0
              # skip_unless R<n>[a-z]*  — covers R16 → R16a/R16b sub-probes
              grep -qE "skip_unless ${r}[a-z]*\b" packages/core/audit-self/*.sh packages/preset-next-15-canonical/audit-self/*.sh 2>/dev/null && in_audit=1
              in_manual=0
              grep -qE "$r.*manual|manual.*$r|$r.*delegated|delegated.*$r" \
                agents/best-practices-sidecar.md packages/core/audit-self/*.sh packages/preset-next-15-canonical/audit-self/*.sh 2>/dev/null && in_manual=1
              if [ "$in_audit" -eq 0 ] && [ "$in_manual" -eq 0 ]; then
                echo "::error::orphan rule $r — no probe, no manual review note, no delegation"
                fail=1
              fi
            done < <(grep -oE "^## R[0-9]+[a-z]?" "$rules_file" | grep -oE "R[0-9]+[a-z]?")
          done
          exit "$fail"

  probe-tests:
    name: Negative tests for audit probes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install ts-morph and tsx for R4 probe
        run: npm install --silent ts-morph tsx
      - name: Run packages/core/audit-self/audit-ai-docs.test.sh
        run: |
          if [ -x packages/core/audit-self/audit-ai-docs.test.sh ]; then
            bash packages/core/audit-self/audit-ai-docs.test.sh
          else
            echo "::error::packages/core/audit-self/audit-ai-docs.test.sh missing or not executable"
            exit 1
          fi

  manifest-render-check:
    name: Manifest → RULES.md drift check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps (hoists tsx to root)
        run: npm install --silent
      - name: Render & diff
        run: npx tsx packages/core/render/render-rules.ts --check

  principles-meta-tests:
    name: Principles as meta-tests (Phase 2)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install packages/core deps
        run: npm install --prefix packages/core --silent
      - name: Run principles meta-tests
        run: npm --prefix packages/core run test:principles

  enforce-husky-presence:
    name: Verify .husky/ hooks exist and are non-trivial
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Verify .husky/ hooks exist and are executable
        run: |
          for hook in .husky/pre-commit .husky/pre-push; do
            test -f "$hook" || { echo "::error::missing $hook"; exit 1; }
            test -x "$hook" || { echo "::error::$hook not executable"; exit 1; }
            # non-empty + non-trivial (not just exit 0)
            grep -qE '\b(actionlint|zizmor|bash -n|json\.load|yaml\.safe_load)\b' "$hook" \
              || { echo "::error::$hook lacks expected probes (looks empty/stub)"; exit 1; }
          done
          echo "✓ .husky/ hooks present, executable, non-trivial"

  framework-self-install-ts-server:
    name: Self-install on tmp consumer (ts-server)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install python pyyaml (required by audit probes)
        run: pip install pyyaml
      - name: Self-install on tmp consumer (ts-server preset)
        run: |
          mkdir -p /tmp/fake-consumer-ts && cd /tmp/fake-consumer-ts
          git init --quiet
          git config user.email "ci@example.com"
          git config user.name "CI"
          echo '{"name":"fake-consumer-ts","version":"0.0.0","private":true}' > package.json
          bash "$GITHUB_WORKSPACE/install.sh" ts-server
      - name: Run framework own audits inside fake consumer
        run: |
          cd /tmp/fake-consumer-ts
          bash "$GITHUB_WORKSPACE/packages/core/audit-self/audit-ai-docs.test.sh" || \
            { echo "::error::framework audits failed inside tmp consumer (ts-server)"; exit 1; }

  framework-self-install-react-next:
    name: Self-install on tmp consumer (react-next)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install python pyyaml (required by audit probes)
        run: pip install pyyaml
      - name: Self-install on tmp consumer (react-next preset)
        run: |
          mkdir -p /tmp/fake-consumer-rn && cd /tmp/fake-consumer-rn
          git init --quiet
          git config user.email "ci@example.com"
          git config user.name "CI"
          echo '{"name":"fake-consumer-rn","version":"0.0.0","private":true}' > package.json
          # next.config.js triggers auto-detection in setup.sh; also pass explicit stack to install.sh
          echo 'module.exports = {};' > next.config.js
          bash "$GITHUB_WORKSPACE/install.sh" react-next
      - name: Run framework own audits inside fake consumer
        run: |
          cd /tmp/fake-consumer-rn
          bash "$GITHUB_WORKSPACE/packages/core/audit-self/audit-ai-docs.test.sh" || \
            { echo "::error::framework audits failed inside tmp consumer (react-next)"; exit 1; }

  framework-self-detect:
    name: Detector v1 — self-application snapshot (L1 invariant)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps (hoists tsx + transitive semver)
        run: npm install --silent
      - name: Detect this repo and diff against frozen snapshot
        run: |
          ACTUAL=$(npm --prefix packages/core run detect --silent -- "$GITHUB_WORKSPACE")
          EXPECTED=$(cat packages/core/detector/expected-self-detect.json)
          if ! diff <(echo "$ACTUAL" | jq -S .) <(echo "$EXPECTED" | jq -S .); then
            echo "::error::detector self-application snapshot drift — update packages/core/detector/expected-self-detect.json or fix the regression"
            exit 1
          fi
          echo "✓ self-detect snapshot stable"
      - name: Verify setup.sh --stack=$(detect) --dry-run idempotent
        run: |
          DETECTED=$(npm --prefix packages/core run detect --silent -- "$GITHUB_WORKSPACE" | jq -r .stack)
          bash setup.sh --stack="$DETECTED" --dry-run --skip-aif-init --skip-deps > /tmp/run1.txt 2>&1
          bash setup.sh --stack="$DETECTED" --dry-run --skip-aif-init --skip-deps > /tmp/run2.txt 2>&1
          if ! diff /tmp/run1.txt /tmp/run2.txt > /dev/null; then
            echo "::error::setup.sh --dry-run is not idempotent — L1 acceptance (a) violated"
            diff /tmp/run1.txt /tmp/run2.txt
            exit 1
          fi
          echo "✓ setup.sh --dry-run idempotent (L1 acceptance a)"

  framework-self-research:
    name: Research Agent v1 — self-application snapshot (L2 invariant)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps (hoists tsx + transitive semver + ajv)
        run: npm install --silent
      - name: Run research --self and diff against frozen snapshot
        run: |
          ACTUAL=$(npm --prefix packages/core run research --silent -- --self "$GITHUB_WORKSPACE")
          EXPECTED=$(cat packages/core/research/expected-self-research.json)
          if ! diff <(echo "$ACTUAL" | jq -S .) <(echo "$EXPECTED" | jq -S .); then
            echo "::error::research self-application snapshot drift — fix the doc divergence or update packages/core/research/expected-self-research.json"
            exit 1
          fi
          echo "✓ self-research snapshot stable (L2 invariant b)"
      - name: Drift detection on canonical own-doc sources (L2 invariant a)
        run: |
          MISMATCHES=$(npm --prefix packages/core run research --silent -- --self "$GITHUB_WORKSPACE" | jq '.drift.mismatches | length')
          if [ "$MISMATCHES" != "0" ]; then
            echo "::error::symbolic drift detected in skills/SKILL.md / references/{overview,ai-traps}.md"
            npm --prefix packages/core run research --silent -- --self "$GITHUB_WORKSPACE" | jq '.drift.mismatches'
            exit 1
          fi
          echo "✓ zero drift across the 3 canonical self-app sources (L2 invariant a)"

  framework-self-synth:
    name: Synthesizer v1 — self-application snapshot (L3 invariant a)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps
        run: npm install --silent
      - name: Synth on own repo and diff against frozen snapshot
        run: |
          ACTUAL=$(npm --prefix packages/core run synth --silent -- "$GITHUB_WORKSPACE")
          EXPECTED=$(cat packages/core/synthesizer/expected-self-synth.json)
          if ! diff <(echo "$ACTUAL" | jq -S .) <(echo "$EXPECTED" | jq -S .); then
            echo "::error::synthesizer self-application snapshot drift — fix the regression or update packages/core/synthesizer/expected-self-synth.json"
            exit 1
          fi
          echo "✓ self-synth snapshot stable (own repo, ts-server, no patterns)"
      - name: Synth on next-16 fixture and diff against frozen snapshot
        run: |
          FIXTURE="$GITHUB_WORKSPACE/packages/core/synthesizer/fixtures/next-16-fixture"
          ACTUAL=$(npm --prefix packages/core run synth --silent -- "$FIXTURE")
          EXPECTED=$(cat packages/core/synthesizer/expected-fixture-synth.json)
          if ! diff <(echo "$ACTUAL" | jq -S .) <(echo "$EXPECTED" | jq -S .); then
            echo "::error::synthesizer fixture snapshot drift — fix the regression or update packages/core/synthesizer/expected-fixture-synth.json"
            exit 1
          fi
          echo "✓ fixture-synth snapshot stable (next-16, 3 rules)"
