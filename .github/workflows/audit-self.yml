name: audit-self

on:
  push:
    branches: [staging, main, 'chore/**']
  pull_request:
  merge_group:

jobs:
  mechanical:
    name: Mechanical checks (bash, json, dead links)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Bash syntax of all *.sh
        run: |
          fail=0
          while IFS= read -r f; do
            if ! bash -n "$f" 2>err.log; then
              echo "::error file=$f::syntax error"
              cat err.log
              fail=1
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*")
          exit "$fail"

      - name: JSON validity of all *.json
        run: |
          fail=0
          while IFS= read -r f; do
            if ! python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f" 2>err.log; then
              echo "::error file=$f::invalid JSON"
              cat err.log
              fail=1
            fi
          done < <(find . -name "*.json" -not -path "./.git/*" -not -path "./node_modules/*")
          exit "$fail"

      - name: No file > 500 lines (markdown)
        # Gate logic extracted to a unit-testable script (single source) so the
        # exemptions — EXECUTION-PLAN.md, research-patches/, and committed durable
        # kickoff.md design docs (cross-session kickoff portability, SSOT #116) —
        # ship with a paired positive+negative test. See md-line-gate.test.ts.
        run: bash packages/core/audit-self/md-line-gate.sh .

      - name: Dead-link check (.md → .md)
        run: |
          while IFS= read -r src; do
            # shellcheck disable=SC2016  # regex literal, no expansion intended
            grep -oE '`[^`]*\.md`' "$src" 2>/dev/null | tr -d '`' | sort -u | while read -r ref; do
              case "$ref" in
                # AIF convention rename targets (template → final name) — not real files in the repo
                *.ai-factory/*|*AGENTS.md|*CLAUDE.md|*DESCRIPTION.md|*ARCHITECTURE.md|*.template.md|*\<*) continue ;;
                docs/architecture.md) continue ;;  # used as anti-pattern example
              esac
              base=$(basename "$ref")
              if ! find . -name "$base" -not -path "./.git/*" 2>/dev/null | grep -q .; then
                echo "::warning file=$src::dead .md reference → $ref"
              fi
            done
            # historical audit reports may reference suggested filenames / anti-patterns
          done < <(find . -name "*.md" -not -path "./.git/*" -not -name "audit-results-*.md" -not -path "./docs/audits/*")

      - name: Research patch scope annotations
        run: |
          fail=0
          while IFS= read -r f; do
            [[ "$(basename "$f")" == "README.md" ]] && continue
            first=$(head -1 "$f")
            if [[ "$first" != "<!-- scope:"* ]]; then
              echo "::error file=$f::missing <!-- scope:... --> annotation on first line"
              fail=1
            fi
          done < <(find docs/meta-factory/research-patches -maxdepth 1 -name "*.md")
          exit "$fail"

      - name: Stale path references
        run: |
          fail=0
          # Excludes orchestrator-prompts/: kickoffs are committed historical design
          # docs (cross-session kickoff portability, SSOT #116) that legitimately quote
          # now-removed artifacts as audit subjects (e.g. an audit kickoff whose job is
          # to remove the stale ref). The guard targets canonical/shipped docs.
          if grep -rn "ai-factory-RULES\.md" --include="*.md" --include="*.sh" --exclude-dir=orchestrator-prompts .; then
            echo "::error::stale 'ai-factory-RULES.md' reference (renamed to factory/RULES.md)"
            fail=1
          fi
          if grep -rn "best-practices-sidecar\.react\.md" --include="*.md" --exclude-dir=orchestrator-prompts .; then
            echo "::error::stale 'best-practices-sidecar.react.md' reference (was inlined)"
            fail=1
          fi
          exit "$fail"

  shipped-prettier:
    name: Shipped artifacts are Prettier-clean (GH #531 dogfood)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      # The framework never ran its own authored shipped artifacts (skill docs, agent prompts,
      # ESLint-rule sources, config templates) through Prettier, so install delivered ~50 files
      # that fail a consumer's first `prettier --check .` (#531). This gate fails when any shipped
      # source drifts from Prettier — keeping "one button → green validate" true out-of-box.
      # Deterministic (Prettier, not an LLM) — complies with no-paid-llm-in-ci.
      - name: npm run format:check (shipped surface only)
        run: npm run format:check
  rule-to-probe:
    name: Rule-to-probe mapping
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Every R-rule has probe / manual / ESLint delegation
        run: |
          fail=0
          for rules_file in packages/preset-next-15-canonical/RULES.md packages/preset-next-15-canonical/RULES.react-next.md; do
            # ^## R<digits>[<lowercase>]?  — matches R1..R20, R16a/R16b; excludes "## Rule maintenance"
            while IFS= read -r r; do
              in_audit=0
              # skip_unless R<n>[a-z]*  — covers R16 → R16a/R16b sub-probes
              # Wave 10.4: also grep *.ts (audit-ai-docs.ts replaced audit-ai-docs.sh)
              grep -qE "skip_unless ${r}[a-z]*\b" packages/core/audit-self/*.sh packages/core/audit-self/*.ts packages/preset-next-15-canonical/audit-self/*.sh 2>/dev/null && in_audit=1
              in_manual=0
              # Wave 10.4: agents/best-practices-sidecar.md removed in PR #79; markers now in *.ts.
              # Use find+xargs to avoid nonexistent-file exit-code-2 masking valid matches.
              if find packages/core/audit-self packages/preset-next-15-canonical/audit-self \( -name "*.sh" -o -name "*.ts" \) -print0 2>/dev/null | \
                 xargs -0 grep -qE "$r.*manual|manual.*$r|$r.*delegated|delegated.*$r" 2>/dev/null; then
                in_manual=1
              fi
              if [ "$in_audit" -eq 0 ] && [ "$in_manual" -eq 0 ]; then
                echo "::error::orphan rule $r — no probe, no manual review note, no delegation"
                fail=1
              fi
            done < <(grep -oE "^## R[0-9]+[a-z]?" "$rules_file" | grep -oE "R[0-9]+[a-z]?")
          done
          exit "$fail"

  probe-tests:
    name: Negative tests for audit probes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install packages/core deps (remark + vitest for audit-ai-docs.test.ts)
        run: npm ci --prefix packages/core --silent
      - name: Run packages/core/audit-self/audit-ai-docs.test.ts (Wave 10.4 — vitest)
        run: |
          if [ -f packages/core/audit-self/audit-ai-docs.test.ts ]; then
            npx --prefix packages/core vitest run --reporter=default packages/core/audit-self/audit-ai-docs.test.ts
          else
            echo "::error::packages/core/audit-self/audit-ai-docs.test.ts missing"
            exit 1
          fi

  manifest-render-check:
    name: Manifest → RULES.md drift check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps (hoists tsx to root)
        run: npm install --silent
      - name: Render & diff
        run: npx tsx packages/core/render/render-rules.ts --check

  principles-meta-tests:
    name: Principles as meta-tests (Phase 2)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0  # principle 11 needs full git history for introducing-commit detection
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install packages/core deps
        run: npm ci --prefix packages/core --silent
      - name: Run principles meta-tests
        run: npm --prefix packages/core run test:principles
      # CI-gap option C (hook-test-suite-rot): the packages/core/hooks/ vitest suite was
      # never gated — only principles/ was — which is how a real cross-platform regression
      # (priority-score-synthetic.sh xargs) accumulated 15 failures unnoticed. Gate it here.
      # Root `npm install` hoists tsx to the repo-root node_modules/.bin so the
      # check-doc-authority hook (which spawns $REPO_ROOT/node_modules/.bin/tsx) actually
      # runs rather than graceful-skipping. jq is preinstalled on ubuntu runners; eslint
      # (guard-liveness) comes from the packages/core install above.
      - name: Install workspace deps (hoists tsx to root for the hooks-suite gate)
        run: npm install --silent
      - name: Run packages/core/hooks/ suite (CI-gap option C — gate the hooks suite)
        run: npm --prefix packages/core run test:hooks
      # CI-gap option C sibling (render-suite-rot): the packages/core/render/ vitest
      # suite was never gated — only principles/ and hooks/ were — which is how a real
      # snapshot drift (R11 audit-self.yml → ci.yml: the manifest R11 row was updated in
      # #474 but the committed .snap was never regenerated) sat green-in-CI yet
      # red-only-on-full-local-run. The manifest→RULES.md `--check` job catches RULES.md
      # drift but not the vitest snapshot. Gate the render suite here. tsx is hoisted by
      # the root install above; ajv comes from the packages/core install.
      - name: Run packages/core/render/ suite (CI-gap option C sibling — gate the render snapshot)
        run: npm --prefix packages/core run test:render
      - name: Run prior-art trailer hook anti-tautology test (Phase 8.8 T9)
        run: bash tests/hooks/prior-art-trailer-hook.test.sh
      - name: Run §1.7 discipline trailer hook anti-tautology test (Wave 10.3)
        run: bash tests/hooks/s17-trailer-hook.test.sh
      - name: Run PREPUSH_UPSTREAM_REF override paired-negative (non-main base backstop)
        run: bash tests/hooks/prepush-upstream-ref.test.sh
      - name: Run pre-push base-ref stdin-detection paired-negative (hook-base-ref-detection I-phase)
        run: bash tests/hooks/prepush-fallback-base-ref.test.sh
      - name: Run runtime-bridge dispatch opt-IN gate paired-negative (one-click-installer kickoff §7)
        run: bash tests/hooks/runtime-bridge-dispatch-optin.test.sh
      - name: Run install-sh no-companion-blocks test (one-click-installer S1)
        run: bash tests/install-sh/no-companion-blocks.test.sh
      - name: Run install-sh manifest-parse test (one-click-installer S2)
        run: bash tests/install-sh/manifest-parse.test.sh
      - name: Run install-sh engine test (one-click-installer S2)
        run: bash tests/install-sh/engine.test.sh
      - name: Run install-sh bridge-guided test (one-click-installer S2)
        run: bash tests/install-sh/bridge-guided.test.sh
      - name: Run install-sh setup-orchestrator test (one-click-installer S3)
        run: bash tests/install-sh/setup-orchestrator.test.sh
      - name: Run ci-success aggregate-gate paired-negative
        run: bash scripts/ci-success-gate.test.sh
      - name: Run harvest-via-api mode/ref paired-negative (Git Data API push fallback)
        run: bash tests/dispatcher/harvest-via-api.test.sh
      - name: Run install.sh internal-refs transform test (Item 12 mirror-sync, SSOT)
        run: bash tests/install-sh/transform-internal-refs.test.sh
      - name: Run audit-ai-docs consumer-mode paired-negative (D3/D5 skip on consumer installs)
        run: bash tests/install-sh/audit-consumer-mode.test.sh
      - name: Run install-sh audit-r4 shipped test (consumer-install-hardening F6)
        run: bash tests/install-sh/audit-r4-shipped.test.sh
      - name: Run install-sh pre-push TS-arm closure test (consumer-install-hardening F1)
        run: bash tests/install-sh/f1-ts-arm.test.sh
      - name: Run install-sh workflow-integrity shipped test (consumer-install-hardening F12)
        run: bash tests/install-sh/f12-workflow-integrity-shipped.test.sh
      - name: Run install-sh hook-activation test (consumer-install-hardening F2)
        run: bash tests/install-sh/f2-hook-activation.test.sh
      - name: Run install-sh stryker packageManager detect test (consumer-install-hardening F13)
        run: bash tests/install-sh/f13-stryker-pm.test.sh
      - name: Run install-sh CI node-version-file test (consumer-install-hardening F11)
        run: bash tests/install-sh/f11-ci-node-version.test.sh
      - name: Run install-sh AGENTS scripts-shipped test (consumer-install-hardening F8)
