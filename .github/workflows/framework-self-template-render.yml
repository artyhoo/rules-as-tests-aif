name: framework-self-template-render

# §13.27 closure — functional template render gate (deterministic only).
# Decision 3: NO LLM, NO API key, NO ANTHROPIC_API_KEY reference.
# LLM-judge probes (P2/P3/P5) are session-bound; see .claude/skills/template-audit/SKILL.md.
#
# Local runtime (write-time measurement per PARTIAL dim 4 fixup):
#   1.3s on Apple M-series / Node 22 / macOS 25.4. Target ≤60s; alarm if CI
#   runtime >120s on baseline ubuntu-latest runner. If CI runtime exceeds
#   target consistently — surface as research-patch on fixture-size vs
#   probe-coverage trade-off.

on:
  push:
    branches: [staging, main, 'chore/**']
  pull_request:

jobs:
  framework-self-template-render:
    name: Template render probes — P1/P4/P6 (deterministic)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # No AI-vendor secrets in env — deterministic-only per «no-paid» / «LLM-then-cache» invariant.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install packages/core deps
        run: npm ci --prefix packages/core --silent

      - name: Run P1/P4/P6 template render probes
        run: npm --prefix packages/core run test:template-render
