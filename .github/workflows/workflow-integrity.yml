name: workflow-integrity

# R11 — CI integrity, executable form.
# See factory/RULES.md#r11--ci-integrity for policy.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  # actionlint + zizmor moved to audit-self.yml so the single required context
  # `ci-success` can `needs:`-aggregate them (cross-file `needs:` is impossible,
  # and a path-filtered required check deadlocks non-workflow PRs). This workflow
  # now carries only the R11 branch-protection self-assertion.
  branch-protection-assertion:
    name: ci-success required-check assertion
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Assert ci-success is a required status check on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tri-state semantics:
          #   - protection or rulesets configured AND include ci-success → pass
          #   - protection or rulesets configured but ci-success missing → fail (R11 violated)
          #   - no protection AND no rulesets → warn (R11 not yet adopted), pass
          # Rationale: don't block PRs in repos that haven't yet configured branch
          # protection. Once configured, R11 enforcement kicks in automatically.

          protection_json="$(gh api "repos/${{ github.repository }}/branches/main/protection" 2>/dev/null || echo 'null')"
          rulesets_json="$(gh api "repos/${{ github.repository }}/rulesets" 2>/dev/null || echo '[]')"

          has_protection=$(echo "$protection_json" | jq 'if . == null or (type=="object" and has("message")) then false else true end')
          has_rulesets=$(echo "$rulesets_json" | jq 'if type=="array" then [.[] | select(.enforcement == "active")] | length > 0 else false end')

          if [ "$has_protection" = "true" ]; then
            if echo "$protection_json" | jq -e '.required_status_checks.contexts | contains(["ci-success"])' > /dev/null; then
              echo "✅ ci-success is required (classic branch protection)"
              exit 0
            fi
            echo "::error::Branch protection exists on main but ci-success is NOT in required status checks (R11 violated)."
            echo "::error::Settings → Branches → main → Require status checks → ci-success"
            exit 1
          fi

          if [ "$has_rulesets" = "true" ]; then
            echo "✅ rulesets active — manually verify ci-success in https://github.com/${{ github.repository }}/settings/rules"
            exit 0
          fi

          echo "::warning::No branch protection or active rulesets on main. R11 not yet adopted in this repo."
          echo "::warning::Configure: Settings → Branches → main → Require status checks → ci-success"
          exit 0
