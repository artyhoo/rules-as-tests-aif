name: CI (React Native)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # FAST CHECKS — parallel
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run typecheck

  # ─────────────────────────────────────────────
  # UNIT TESTS
  # ─────────────────────────────────────────────
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm test
        env:
          CI: 'true'

  # ─────────────────────────────────────────────
  # SECURITY
  # ─────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm audit --audit-level=high
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # AI DOCUMENTATION AUDIT
  # ─────────────────────────────────────────────
  audit-ai-docs:
    name: AI documentation audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Run audit-ai-docs.react-native.sh
        run: |
          if [ -x "audit-self/audit-ai-docs.react-native.sh" ]; then
            bash audit-self/audit-ai-docs.react-native.sh
          fi

  # ─────────────────────────────────────────────
  # FINAL GATE — required check for merge
  # ─────────────────────────────────────────────
  ci-success:
    name: CI passed
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test-unit
      - security
      - audit-ai-docs
    if: always()
    steps:
      - run: |
          for r in "${{ needs.lint.result }}" \
                  "${{ needs.typecheck.result }}" \
                  "${{ needs.test-unit.result }}" \
                  "${{ needs.security.result }}" \
                  "${{ needs.audit-ai-docs.result }}"; do
            [ "$r" = "success" ] || { echo "Failed job: $r"; exit 1; }
          done
          echo "All checks passed."
