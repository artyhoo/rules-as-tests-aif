name: CI (UI — React SPA)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # FAST CHECKS — parallel
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run typecheck

  architecture:
    name: Architecture rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run arch:check

  # ─────────────────────────────────────────────
  # UNIT + COMPONENT TESTS
  # ─────────────────────────────────────────────
  test-unit:
    name: Unit & component tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run test:coverage
        env:
          CI: 'true'
      - uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info

  # ─────────────────────────────────────────────
  # BUILD — Vite compile-time checks
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run build
      - name: Cache build
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: dist
          key: vite-build-${{ github.sha }}

  # ─────────────────────────────────────────────
  # PLAYWRIGHT E2E
  # ─────────────────────────────────────────────
  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npx playwright install --with-deps
      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: dist
          key: vite-build-${{ github.sha }}
      - run: npx playwright test
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────
  # MUTATION TESTING — incremental on PR diff
  # ─────────────────────────────────────────────
  mutation:
    name: Mutation testing (incremental)
    runs-on: ubuntu-latest
    needs: [test-unit]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0, persist-credentials: false }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: reports/stryker-incremental.json
          key: stryker-${{ github.base_ref }}-${{ github.sha }}
          restore-keys: |
            stryker-${{ github.base_ref }}-
            stryker-

      - name: Stryker on diff only
        run: |
          CHANGED=$(git diff --name-only "origin/$GITHUB_BASE_REF...HEAD" \
            | grep -E '^src/.+\.(ts|tsx)$' \
            | grep -v -E '\.(unit|integration|audit|e2e|test|spec|stories)\.(ts|tsx)$' \
            | tr '\n' ',' || true)
          if [ -n "$CHANGED" ]; then
            npx stryker run --mutate "$CHANGED" --incremental
          else
            echo "No src/ changes — skipping Stryker"
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: mutation-${{ github.sha }}
          path: reports/mutation/
          retention-days: 14

  # ─────────────────────────────────────────────
  # SECURITY
  # ─────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm audit --audit-level=high
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # AI DOCUMENTATION AUDIT
  # ─────────────────────────────────────────────
  audit-ai-docs:
    name: AI documentation audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - name: Run audit-ai-docs.sh
        run: |
          if [ -x "scripts/audit-ai-docs.sh" ]; then
            ./scripts/audit-ai-docs.sh
          fi
          if [ -x "scripts/audit-ai-docs.react-spa.sh" ]; then
            ./scripts/audit-ai-docs.react-spa.sh
          fi

  # ─────────────────────────────────────────────
  # FINAL GATE — required check for merge
  # ─────────────────────────────────────────────
  ci-success:
    name: CI passed
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - architecture
      - test-unit
      - test-e2e
      - build
      - security
      - audit-ai-docs
    if: always()
    steps:
      - run: |
          for r in "${{ needs.lint.result }}" \
                  "${{ needs.typecheck.result }}" \
                  "${{ needs.architecture.result }}" \
                  "${{ needs.test-unit.result }}" \
                  "${{ needs.test-e2e.result }}" \
                  "${{ needs.build.result }}" \
                  "${{ needs.security.result }}" \
                  "${{ needs.audit-ai-docs.result }}"; do
            [ "$r" = "success" ] || { echo "Failed job: $r"; exit 1; }
          done
          echo "All checks passed."
