name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Minimal default permissions
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # FAST CHECKS — parallel, fail-fast
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run lint
      - run: npm run format:check
      # Custom ESLint rules (R2 always; R7/R8 under AIF_STRICT_RUNTIME) only fire on files
      # their globs match. If a layout (flat / inline-router / monorepo) leaves a rule matching
      # ZERO files it is SILENTLY INERT — the worst failure for a "no check → no rule" framework.
      # This gate FAILS loudly so the gap can never ship unnoticed. Dependency-free (pure bash).
      - name: Rule-glob liveness (custom ESLint rules must not be silently inert)
        run: bash scripts/check-rule-globs.sh

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run typecheck

  architecture:
    name: Architecture rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run arch:check

  # ─────────────────────────────────────────────
  # TESTS + COVERAGE
  # ─────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run test:coverage
        env:
          CI: 'true'
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true
      - name: Save coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # MUTATION TESTING — incremental on PR diff
  # ─────────────────────────────────────────────
  mutation:
    name: Mutation testing (incremental)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for diff
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline

      - name: Cache Stryker incremental report
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-${{ github.base_ref }}-${{ github.sha }}
          restore-keys: |
            stryker-${{ github.base_ref }}-
            stryker-

      - name: Stryker on diff only
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^src/.+\.(ts|tsx)$' \
            | grep -v -E '\.(test|spec|stories)\.(ts|tsx)$' \
            | tr '\n' ',' || true)
          if [ -n "$CHANGED" ]; then
            npx stryker run --mutate "$CHANGED" --incremental
          else
            echo "No src/ changes — skipping Stryker"
          fi

      - name: Upload mutation HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-${{ github.sha }}
          path: reports/mutation/
          retention-days: 14

  # ─────────────────────────────────────────────
  # SECURITY
  # ─────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - name: npm audit (high+)
        run: npm audit --audit-level=high
      - name: gitleaks (secrets scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # AI DOCUMENTATION AUDIT — drift + code-vs-docs probes
  # ─────────────────────────────────────────────
  audit-ai-docs:
    name: AI documentation audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - name: Run audit-ai-docs.sh
        run: |
          if [ -x "scripts/audit-ai-docs.sh" ]; then
            ./scripts/audit-ai-docs.sh
          else
            echo "::warning::scripts/audit-ai-docs.sh not found — skipping"
          fi

  # ─────────────────────────────────────────────
  # FINAL GATE — required check for merge
  # ─────────────────────────────────────────────
  ci-success:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, architecture, test, security, audit-ai-docs]
    if: always()
    steps:
      - run: |
          for r in "${{ needs.lint.result }}" \
                  "${{ needs.typecheck.result }}" \
                  "${{ needs.architecture.result }}" \
                  "${{ needs.test.result }}" \
                  "${{ needs.security.result }}" \
                  "${{ needs.audit-ai-docs.result }}"; do
            [ "$r" = "success" ] || { echo "Failed job: $r"; exit 1; }
          done
          echo "All checks passed."
