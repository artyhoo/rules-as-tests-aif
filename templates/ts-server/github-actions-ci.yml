name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Minimal default permissions
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # FAST CHECKS — parallel, fail-fast
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run lint
      - run: npm run format:check
      # Custom ESLint rules (R2 always; R7/R8 under AIF_STRICT_RUNTIME) only fire on files
      # their globs match. If a layout (flat / inline-router / monorepo) leaves a rule matching
      # ZERO files it is SILENTLY INERT — the worst failure for a "no check → no rule" framework.
      # This gate FAILS loudly so the gap can never ship unnoticed. Dependency-free (pure bash).
      - name: Rule-glob liveness (custom ESLint rules must not be silently inert)
        run: bash scripts/check-rule-globs.sh
      # GH #535: check:globs proves the rule's globs MATCH files; this proves the rule is actually
      # APPLIED. On a monorepo with per-package eslint configs that re-export a base not wiring R2,
      # `lint` + check:globs pass while R2 is silently inert. Resolves the real config per boundary
      # file via `eslint --print-config` (runs after `npm ci`, when eslint is present).
      - name: Rule actually applied (R2 binds to boundary files, not just glob-matched)
        run: bash scripts/check-rule-enforced.sh
      # Same gate `npm run validate` runs locally — a single root .lintstagedrc.json can leave a
      # per-package binary unresolvable (ENOENT) before the first commit. Pure bash, dependency-free;
      # exits 0 (skips) when node_modules is absent, runs for real after `npm ci`.
      - name: lint-staged config resolves (binaries reachable before first commit)
        run: bash scripts/check-lintstaged-resolves.sh

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run typecheck

  architecture:
    name: Architecture rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run arch:check
      # GH #534: arch:check enforces the boundaries the config carries, but dependency-cruiser has
      # no "rule matched nothing" report — on a monorepo whose arch config lacks packages↛apps /
      # apps↔apps rules, arch:check is green while the boundary is unguarded. This is the R3
      # inertness alarm (the dependency-cruiser analog of check:globs). Dependency-free; skips on flat.
      - name: Architecture boundary liveness (monorepo packages↛apps rule must not be silently absent)
        run: bash scripts/check-arch-boundaries.sh

  # ─────────────────────────────────────────────
  # TESTS + COVERAGE
  # ─────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run test:coverage
        env:
          CI: 'true'
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true
      - name: Save coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # MUTATION TESTING — incremental on PR diff
  # ─────────────────────────────────────────────
  mutation:
    name: Mutation testing (incremental)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # full history for diff
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline

      - name: Cache Stryker incremental report
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: reports/stryker-incremental.json
          key: stryker-${{ github.base_ref }}-${{ github.sha }}
          restore-keys: |
            stryker-${{ github.base_ref }}-
            stryker-

      - name: Stryker on diff only
        run: |
          CHANGED=$(git diff --name-only "origin/$GITHUB_BASE_REF...HEAD" \
            | grep -E '^src/.+\.(ts|tsx)$' \
            | grep -v -E '\.(test|spec|stories)\.(ts|tsx)$' \
            | tr '\n' ',' || true)
          if [ -n "$CHANGED" ]; then
            npx stryker run --mutate "$CHANGED" --incremental
          else
            echo "No src/ changes — skipping Stryker"
          fi

      - name: Upload mutation HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mutation-${{ github.sha }}
          path: reports/mutation/
          retention-days: 14

  # ─────────────────────────────────────────────
  # SECURITY
  # ─────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - name: npm audit (high+)
        run: npm audit --audit-level=high
      - name: gitleaks (secrets scan)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # AI DOCUMENTATION AUDIT — drift + code-vs-docs probes
  # ─────────────────────────────────────────────
  audit-ai-docs:
    name: AI documentation audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline
      - name: Run audit-ai-docs.sh
        run: |
          if [ -x "scripts/audit-ai-docs.sh" ]; then
            ./scripts/audit-ai-docs.sh
          else
            echo "::warning::scripts/audit-ai-docs.sh not found — skipping"
          fi

  # ─────────────────────────────────────────────
  # FINAL GATE — required check for merge
  # ─────────────────────────────────────────────
  ci-success:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, architecture, test, security, audit-ai-docs]
    if: always()
    steps:
      - run: |
          for r in "${{ needs.lint.result }}" \
                  "${{ needs.typecheck.result }}" \
                  "${{ needs.architecture.result }}" \
                  "${{ needs.test.result }}" \
                  "${{ needs.security.result }}" \
                  "${{ needs.audit-ai-docs.result }}"; do
            [ "$r" = "success" ] || { echo "Failed job: $r"; exit 1; }
          done
          echo "All checks passed."
